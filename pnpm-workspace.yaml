# pnpm 11 supply-chain hardening (see .agents/nextjs.md).
# These defaults stay ON. Do not relax without recording why in .agents/.

# Cooldown: never auto-adopt a version published less than 1 day ago,
# so a freshly-compromised release isn't pulled in. Raise to 4320 (3 days)
# for extra caution.
minimumReleaseAge: 1440

# Only direct dependencies may resolve from git/tarball (exotic) sources.
blockExoticSubdeps: true

# Lifecycle/build scripts are blocked by default. pnpm 11 requires an explicit
# per-package decision (true/false) for every dependency that ships a build
# script, otherwise it errors. Keep everything `false` (reviewed, do NOT build).
# Flip a package to `true` ONLY when it genuinely needs a native build, and add a
# one-line justification here. No package is currently permitted to build.
#   - sharp         — next/image optimizer; ships prebuilt platform binaries, so
#                     no install-time build is required for our usage.
#   - unrs-resolver — eslint-config-next import resolver; ships prebuilt napi
#                     bindings, so lint works without the build step.
allowBuilds:
  sharp: false
  unrs-resolver: false
